api = "0.7"

[buildpack]
  description = "A buildpack for configurating FPM"
  homepage = "https://github.com/paketo-buildpacks/php-fpm"
  id = "paketo-buildpacks/php-fpm"
  keywords = ["php", "fpm"]
  name = "Paketo Buildpack for PHP FPM"

  [[buildpack.licenses]]
    type = "Apache-2.0"
    uri = "https://github.com/paketo-buildpacks/php-fpm/blob/main/LICENSE"

[metadata]
  include-files = ["buildpack.toml", "linux/amd64/bin/build", "linux/amd64/bin/detect", "linux/amd64/bin/run", "linux/arm64/bin/build", "linux/arm64/bin/detect", "linux/arm64/bin/run", "config/php-fpm-base.conf", "config/php-fpm-buildpack.conf"]
  pre-package = "./scripts/build.sh --target linux/amd64 --target linux/arm64"

[[stacks]]
  id = "io.buildpacks.stacks.jammy"

[[stacks]]
  id = "io.buildpacks.stacks.noble"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
